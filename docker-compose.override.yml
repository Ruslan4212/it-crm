# Development override — enables live reload for backend and frontend
version: "3.8"
services:
  backend:
    volumes:
      - ./backend/src:/app/src
    environment:
      - NODE_ENV=development
    command: npx nodemon index.js

  frontend:
    volumes:
      - ./frontend/src:/app/src
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"

  nginx:
    ports:
      - "80:80"
