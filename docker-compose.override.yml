# Development override — enables live reload for backend and frontend
services:
  backend:
    volumes:
      - ./backend/src:/app/src
    environment:
      - NODE_ENV=development
      - AI_ENDPOINT=http://host.docker.internal:8081
      - AI_MODEL=deepseek-v2-lite
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: npx nodemon index.js

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
